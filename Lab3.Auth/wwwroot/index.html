<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Центр вакцинации</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #0b1020;
      --card: rgba(255,255,255,.08);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.72);
      --border: rgba(255,255,255,.14);
      --accent: #7c5cff;
      --bad: #ff4d6d;
      --ok: #22c55e;
      --shadow: 0 18px 50px rgba(0,0,0,.45);
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
      background:
        radial-gradient(900px 500px at 15% 0%, rgba(124,92,255,.45), transparent 55%),
        radial-gradient(900px 500px at 85% 10%, rgba(34,197,94,.25), transparent 55%),
        linear-gradient(180deg, #133475, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: .2px;
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }

    .card {
      grid-column: span 6;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 14px;
      backdrop-filter: blur(10px);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 0 0 6px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.22);
      color: var(--text);
      padding: 10px 10px;
      outline: none;
    }
    input:focus { border-color: rgba(124,92,255,.65); }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(124,92,255,.18);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: .1px;
    }
    button:hover { border-color: rgba(124,92,255,.6); }
    button.secondary { background: rgba(255,255,255,.06); }

    .out {
      margin-top: 10px;
      padding: 10px;
      border-radius: 12px;
      border: 1px dashed rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 44px;
    }

    .status {
      grid-column: span 12;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
    }

    .pill {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.18);
      color: var(--muted);
    }
    .pill.ok { border-color: rgba(34,197,94,.35); color: rgba(214,255,230,.92); }
    .pill.bad { border-color: rgba(255,77,109,.35); color: rgba(255,220,226,.92); }

    @media (max-width: 900px) {
      .card { grid-column: span 12; }
      .row { grid-template-columns: 1fr; }
      header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Центр вакцинации</h1>
        <p>Доступна: регистрация, авторизация, смена пароля и запись на приём.</p>
      </div>
          </header>


    <div class="grid" style="margin-top:14px">
      <section class="card">
        <h2>Регистрация пациента</h2>
        <div class="row">
          <div>
            <label for="regUser">Логин</label>
            <input id="regUser" placeholder="3–20, буквы/цифры/символы" autocomplete="username" />
          </div>
          <div>
            <label for="regPass">Пароль</label>
            <input id="regPass" placeholder="≥ 6 знаков" type="password" autocomplete="new-password" />
          </div>
        </div>
        <div class="actions">
          <button id="btnRegister">Зарегистрировать</button>
                  </div>
      </section>

      <section class="card">
        <h2>Вход в личный кабинет</h2>
        <div class="row">
          <div>
            <label for="loginUser">Логин</label>
            <input id="loginUser" placeholder="3–20, буквы/цифры/символы" autocomplete="username" />
          </div>
          <div>
            <label for="loginPass">Пароль</label>
            <input id="loginPass" placeholder="≥ 6 знаков" type="password" autocomplete="current-password" />
          </div>
        </div>
        <div class="actions">
          <button id="btnLogin">Войти</button>
        </div>
        
      </section>

      <section class="card">
        <h2>Смена пароля</h2>
        <div class="row">
          <div>
            <label for="cpUser">Логин</label>
            <input id="cpUser" placeholder="3–20, буквы/цифры/символы" autocomplete="username" />
          </div>
          <div>
            <label for="cpOld">Старый пароль</label>
            <input id="cpOld" placeholder="oldpass" type="password" autocomplete="current-password" />
          </div>
        </div>
        <div class="row">
          <div>
            <label for="cpNew">Новый пароль</label>
            <input id="cpNew" placeholder="newpass" type="password" autocomplete="new-password" />
          </div>
          <div>
            <label>&nbsp;</label>
            <button id="btnChangePassword" style="width:100%">Сменить пароль</button>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Запись на вакцинацию</h2>
        <div style="color:var(--muted);font-size:12px;margin-bottom:8px">
        </div>
        <div class="row">
          <div>
            <label for="apptUser">Логин</label>
            <input id="apptUser" placeholder="3–20, буквы/цифры/символы" autocomplete="username" />
          </div>
          <div>
            <label for="apptDate">Дата</label>
            <input id="apptDate" type="date" />
          </div>
        </div>
        <div class="row">
          <div>
            <label for="apptVaccine">Вакцина</label>
            <input id="apptVaccine" placeholder="Например: Sputnik V" />
          </div>
          <div>
            <label for="apptNote">Комментарий (необязательно)</label>
            <input id="apptNote" placeholder="Например: первая доза" />
          </div>
        </div>
        <div class="actions">
          <button id="btnCreateAppt">Записаться</button>
          <button class="secondary" id="btnMyAppts">Мои записи</button>
        </div>
      </section>

      
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function pretty(obj) {
      try { return JSON.stringify(obj, null, 2); } catch { return String(obj); }
    }

    async function callApi(path, body) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      let json = null;
      try { json = await res.json(); } catch { /* ignore */ }
      return { status: res.status, ok: res.ok, json };
    }

    async function apiGet(path) {
      const res = await fetch(path);
      let json = null;
      try { json = await res.json(); } catch { /* ignore */ }
      return { status: res.status, ok: res.ok, json };
    }

    function setOut(el, payload) {
      el.textContent = pretty(payload);
    }

    function setPill(text, ok) {
      const el = $('apiStatus');
      el.textContent = text;
      el.classList.remove('ok', 'bad');
      el.classList.add(ok ? 'ok' : 'bad');
    }

    $('btnRegister').addEventListener('click', async () => {
      const out = $('outRegister');
      out.textContent = '...';
      const result = await callApi('/api/register', {
        username: $('regUser').value,
        password: $('regPass').value
      });
      setOut(out, result);
    });

    $('btnLogin').addEventListener('click', async () => {
      const out = $('outLogin');
      out.textContent = '...';
      const result = await callApi('/api/login', {
        username: $('loginUser').value,
        password: $('loginPass').value
      });
      setOut(out, result);
    });

    $('btnChangePassword').addEventListener('click', async () => {
      const out = $('outChangePassword');
      out.textContent = '...';
      const result = await callApi('/api/change-password', {
        username: $('cpUser').value,
        oldPassword: $('cpOld').value,
        newPassword: $('cpNew').value
      });
      setOut(out, result);
    });

    $('btnCreateAppt').addEventListener('click', async () => {
      const out = $('outAppt');
      out.textContent = '...';
      const result = await callApi('/api/appointments', {
        username: $('apptUser').value,
        date: $('apptDate').value,
        vaccine: $('apptVaccine').value,
        note: $('apptNote').value
      });
      setOut(out, result);
    });

    $('btnMyAppts').addEventListener('click', async () => {
      const out = $('outAppt');
      out.textContent = '...';
      const u = encodeURIComponent(($('apptUser').value || '').trim());
      const result = await apiGet('/api/appointments/' + u);
      setOut(out, result);
    });

    async function refreshUsers() {
      const out = $('outUsers');
      out.textContent = '...';
      const result = await apiGet('/api/users');
      setOut(out, result);
    }

    $('btnUsers').addEventListener('click', refreshUsers);

    (async () => {
      try {
        const res = await fetch('/api/users');
        setPill('API: доступно', res.ok);
      } catch {
        setPill('API: недоступно', false);
      }
    })();
  </script>
</body>
</html>
